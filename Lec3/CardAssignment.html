<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlexBox Assigment</title>


    <style>
        body{
            margin: 0;
        }
        nav{
            background-color: black;
            color: white;
            height: 50px;
            text-align: center;
            align-items: center;
            padding-top: 15px;
            font-size: 30px;
        }

        .container{
            height: calc(100vh - 65px);
            background-color: #9d9d9d;
            display: flex;
            gap: 20px;
            justify-content: space-evenly;
            align-items: center;
        }

        .cards{
            height: 250px;
            width: 200px;
            background-color: white;
            border-radius: 12px;
            box-shadow: 3px 3px 15px rgb(39, 39, 39);
            text-align: center;
        }

        .cards img{
            margin-top: 20px;
            height: 90px;
            width: 150px;
        }
        .cards h2{
            margin: 0;
            margin-top: 2px;
            font-size: 20px;
        }
    </style>


</head>

    <nav>
