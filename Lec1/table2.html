<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Time Table</title>
</head>
<body>

    <table border="1">
        <thead>
            <th>Day/Lec</th>
            <th>1</th>
            <th>2</th>
            <th>3</th>
            <th></th>
            <th>4</th>
            <th>5</th>

        </thead>

        <tbody>
            <tr>
                <th>Mon</th>

                <td>C++</td>
                <td>HTML</td>
                <td>CSS</td>

                <td rowspan="5">BREAK</td>

                <td>JAVA</td>
                <td>C++</td>
            </tr>


                <!--Tuesday-->

                <tr>
                    <th>Tue</th>

                    <td rowspan="2">ENG</td>
                    <td colspan="2">WEB DEV</td>
                    <td colspan="2">JS</td>
                </tr>

                <!--WEDNESDAY-->

                <tr>
                    <th>WED</th>

                    <td colspan="2">C++</td>
                    <td>HTML</td>
                    <td>OS</td>
                </tr>

                <!--Thurday-->

                <tr>
                    <th>THU</th>

                <td colspan="3">JAVA</td>

                <td>ENGLISH</td>
                <td>COMPUTER NETWORK</td>

                </tr>

                <!--FRIDAY-->
                <tr>
                    <th>FRI</th>

                    <td colspan="3">DATA SCIENCE</td>
                    <td>C++</td>
                    <td>JS</td>
                </tr>

                
        </tbody>
    </table>
    
</body>
</html>
