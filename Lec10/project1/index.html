<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CALCULATOR</title>

    <link rel="stylesheet" href="style.css">
    
</head>
<body>
    <div class="calcultor">
        <div class="screen">
            <p class="output">0</p>
        </div>
        <div class="keys">
            <div class="keypads">
                <div class="digits">1</div>
                <div class="digits">2</div>
                <div class="digits">3</div>
                <div class="digits">4</div>
                <div class="digits">5</div>
                <div class="digits">6</div>
                <div class="digits">7</div>
                <div class="digits">8</div>
                <div class="digits">9</div>
                <div class="digits">0</div>
                <div class="digits plus">+</div>
                <div class="digits minus">-</div>
                <div class="digits multi">*</div>
                <div class="digits divide">/</div>
                <div class="digits equal">=</div>
                <div class="digits equal">C</div>
                <div class="digits equal">AC</div>
            </div>

            
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
